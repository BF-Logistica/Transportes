<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Validador de Etiquetas PRO</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        :root {
            --blue: #007bff;
            --success: #28a745;
            --error: #dc3545;
            --gray: #6c757d;
        }

        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f2f5;
            padding: 20px;
            margin: 0;
        }

        .scanner-container {
            width: 100%;
            max-width: 500px;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 4 / 3;
            /* Forzar relación aspecto */
            border: 2px solid #ddd;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Llenar el contenedor */
            display: block;
        }

        /* Mira telescópica / Guía visual */
        .camera-guide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .guide-box {
            width: 80%;
            /* 80% del ancho del video */
            height: 60%;
            /* 60% del alto del video */
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
            /* Oscurecer bordes fuera de guía */
        }

        .guide-box::before {
            content: "CENTRAR ETIQUETA AQUÍ";
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Esquinas de la mira */
        .corner-tl, .corner-tr, .corner-bl, .corner-br {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 5px solid var(--blue);
        }

        .corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* Canvas oculto para procesar imagen */
        canvas { display: none; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-master { background: var(--blue); }
        .btn-prov { background: var(--gray); }
        .btn-reset { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .results {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #ccc;
        }

        .card.active { border-top-color: var(--blue); }
        .card h3 { margin-top: 0; font-size: 0.9rem; color: #555; text-align: center; }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .label { font-weight: bold; color: #444; font-size: 0.8rem; }
        .val { font-family: monospace; font-size: 1rem; color: #1a1a1a; font-weight: bold;}

        #loading {
            display: none;
            margin: 10px;
            color: var(--blue);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }

        .status-badge {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            width: 100%;
            max-width: 770px;
            display: none;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <h2>OCR Validador de Etiquetas PRO</h2>

    <div class="scanner-container">
        <video id="video" autoplay playsinline></video>
        <div class="camera-guide">
            <div class="guide-box">
                <div class="corner-tl"></div>
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="corner-br"></div>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="loading">Procesando imagen (OCR)... por favor espera...</div>

    <div class="controls">
        <button id="btnMaster" class="btn-master" onclick="capturar('master')">1. Capturar Master</button>
        <button id="btnProv" class="btn-prov" onclick="capturar('prov')" disabled>2. Capturar Proveedor</button>
        <button class="btn-reset" onclick="resetear()">Limpiar</button>
    </div>

    <div class="results">
        <div class="card" id="cardMaster">
            <h3>DATOS MASTER</h3>
            <div class="data-row"><span class="label">NART:</span> <span id="m-nart" class="val">---</span></div>
            <div class="data-row"><span class="label">LOTE:</span> <span id="m-lote" class="val">---</span></div>
            <div class="data-row"><span class="label">CANT:</span> <span id="m-cant" class="val">---</span></div>
        </div>

        <div class="card" id="cardProv">
            <h3>DATOS PROVEEDOR</h3>
            <div class="data-row"><span class="label">NART:</span> <span id="p-nart" class="val">---</span></div>
            <div class="data-row"><span class="label">LOTE:</span> <span id="p-lote" class="val">---</span></div>
            <div class="data-row"><span class="label">CANT:</span> <span id="p-cant" class="val">---</span></div>
        </div>
    </div>

    <div id="global-status" class="status-badge"></div>

    <script>
        let masterData = { nart: null, lote: null, cant: null };
        let provData = { nart: null, lote: null, cant: null };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Iniciar cámara con resolución ideal superior
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) { alert("Error acceso cámara: " + err); }
        }

        // Función principal de captura y procesamiento (MEJORADA CON CROPPING)
        async function capturar(tipo) {
            document.getElementById('loading').style.display = 'block';

            // 1. Tomar foto y CORTARLA según la guía visual
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            const guideBoxCssWidth = 0.8; // Guía CSS es 80% ancho
            const guideBoxCssHeight = 0.6; // Guía CSS es 60% alto

            // Calcular coordenadas de corte en el video real
            const cropW = videoW * guideBoxCssWidth;
            const cropH = videoH * guideBoxCssHeight;
            const cropX = (videoW - cropW) / 2;
            const cropY = (videoH - cropH) / 2;

            // Establecer el canvas al tamaño del RECORTE, no del video completo
            canvas.width = cropW;
            canvas.height = cropH;
            
            // Dibuja solo la zona recortada al canvas: drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh)
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            // 2. Pre-procesamiento AGRESIVO: Umbralización estricta (B&W puro)
            // Tesseract funciona mejor con blanco y negro puro, sin grises.
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let avg = (d[i] + d[i + 1] + d[i + 2]) / 3;
                let val = (avg > 130) ? 255 : 0; // Umbralización: >130 es blanco, <=130 es negro
                d[i] = d[i + 1] = d[i + 2] = val;
            }
            ctx.putImageData(imgData, 0, 0);

            // 3. Ejecutar OCR con Tesseract.js sobre el RECORTE nítido
            try {
                const result = await Tesseract.recognize(canvas.toDataURL('image/jpeg'), 'spa');
                // Regex mejorada: soporte para espacios opcionales alrededor del guion
                const fullText = result.data.text.replace(/\s+/g, ' '); 
                console.log("Texto detectado:", fullText);

                if (tipo === 'master') {
                    procesarMaster(fullText);
                } else {
                    procesarProv(fullText);
                }
            } catch (e) {
                console.error(e);
                alert("Error procesando OCR");
            }

            document.getElementById('loading').style.display = 'none';
        }

        function procesarMaster(text) {
            // Regex mejoradas: Soporte para espacios opcionales alrededor de los guiones que el OCR a veces añade
            const nartMatch = text.match(/\d{5}\s*-\s*\d{5}\s*-\s*\d{2}/);
            const loteMatch = text.match(/\b\d{8}\b/); // 8 dígitos exactos
            const cantMatch = text.match(/([\d,.]+)\s*UN/i);

            masterData.nart = nartMatch ? nartMatch[0].replace(/\s/g, '') : "No encontrado";
            masterData.lote = loteMatch ? loteMatch[0] : "No encontrado";
            // Limpiar cantidad de puntos y comas
            masterData.cant = cantMatch ? cantMatch[1].replace(/[,.]/g, '') : "No encontrado";

            actualizarUI('m');
            // Habilitar botón proveedor
            document.getElementById('btnProv').disabled = false;
            document.getElementById('btnProv').style.background = 'var(--blue)';
            document.getElementById('cardMaster').classList.add('active');
        }

        function procesarProv(text) {
            // Lógica inteligente de coincidencia

            // --- VALIDAR NART ---
            if (masterData.nart !== "No encontrado" && text.includes(masterData.nart)) {
                provData.nart = masterData.nart;
            } else {
                const nMatch = text.match(/\d{5}\s*-\s*\d{5}\s*-\s*\d{2}/);
                provData.nart = nMatch ? nMatch[0].replace(/\s/g, '') : "No encontrado";
            }

            // --- VALIDAR LOTE ---
            if (masterData.lote !== "No encontrado" && text.includes(masterData.lote)) {
                provData.lote = masterData.lote;
            } else {
                const lMatch = text.match(/\b\d{6,8}\b/); // Proveedores pueden tener 6 a 8
                provData.lote = lMatch ? lMatch[0] : "No encontrado";
            }

            // --- VALIDAR CANTIDAD ---
            if (masterData.cant !== "No encontrado" && text.includes(masterData.cant)) {
                provData.cant = masterData.cant;
            } else {
                // Regex flexible para buscar cantidad cerca de palabras clave de proveedor
                const cMatch = text.match(/(?:CANT|PIEZAS|UNITS|PALLET|CAJA)\D*([\d,.]+)/i);
                provData.cant = cMatch ? cMatch[1].replace(/[,.]/g, '') : "No encontrado";
            }

            actualizarUI('p');
            document.getElementById('cardProv').classList.add('active');
            compararTodo();
        }

        function actualizarUI(prefix) {
            const data = (prefix === 'm') ? masterData : provData;
            document.getElementById(`${prefix}-nart`).innerText = data.nart;
            document.getElementById(`${prefix}-lote`).innerText = data.lote;
            document.getElementById(`${prefix}-cant`).innerText = data.cant;
        }

        function compararTodo() {
            const status = document.getElementById('global-status');
            status.style.display = 'block';

            const coinciden = (masterData.nart === provData.nart &&
                masterData.lote === provData.lote &&
                masterData.cant === provData.cant);

            if (coinciden) {
                status.innerText = "✅ ¡COINCIDENCIA TOTAL!";
                status.style.background = 'var(--success)';
                status.style.color = 'white';
                reproducirSonido(true);
            } else {
                status.innerText = "❌ DIFERENCIAS DETECTADAS";
                status.style.background = 'var(--error)';
                status.style.color = 'white';
                reproducirSonido(false);
            }
        }

        // Función de audio optimizada
        function reproducirSonido(esExito) {
            const ruta = esExito ? 'functions/correct.mp3' : 'functions/error.mp3';
            const audio = new Audio(ruta);
            audio.play().catch(err => console.warn("Audio bloqueado o no encontrado: " + ruta));
        }

        function resetear() {
            location.reload();
        }

        initCamera();
    </script>
</body>

</html>
