<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetas</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="img/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="img/icon-512.png" sizes="512x512">
    
    <style>
        :root {
            --blue: #007bff;
            --success: #28a745;
            --error: #dc3545;
            --gray: #6c757d;
        }

        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f2f5;
            padding: 0 0 20px 0;
            margin: 0;
        }

        .header-logo {
            width: 100%;
            background-color: #0b1c60;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .header-logo img {
            max-height: 40px;
        }

        h2 {
            margin-top: 0;
            padding: 0 20px;
            text-align: center;
        }

        .scanner-container {
            width: calc(100% - 40px);
            max-width: 500px;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 4 / 3;
            border: 2px solid #ddd;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .camera-guide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .guide-box {
            width: 90%;
            height: 65%;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
        }

        .guide-box::before {
            content: "CENTRAR ETIQUETA AQUÍ";
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .corner-tl,
        .corner-tr,
        .corner-bl,
        .corner-br {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 5px solid var(--blue);
        }

        .corner-tl {
            top: -2px;
            left: -2px;
            border-right: 0;
            border-bottom: 0;
        }

        .corner-tr {
            top: -2px;
            right: -2px;
            border-left: 0;
            border-bottom: 0;
        }

        .corner-bl {
            bottom: -2px;
            left: -2px;
            border-right: 0;
            border-top: 0;
        }

        .corner-br {
            bottom: -2px;
            right: -2px;
            border-left: 0;
            border-top: 0;
        }

        canvas {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-master {
            background: var(--blue);
        }

        .btn-prov {
            background: var(--gray);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .results {
            display: flex;
            gap: 15px;
            width: calc(100% - 40px);
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #ccc;
        }

        .card.active {
            border-top-color: var(--blue);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--blue);
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        .data-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .label {
            font-weight: bold;
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .val {
            font-family: monospace;
            font-size: 1.1rem;
            color: #1a1a1a;
            font-weight: bold;
            text-align: center;
        }

        #loading {
            display: none;
            margin: 10px;
            color: var(--blue);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }

        .status-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: none;
            width: 85%;
            max-width: 400px;
        }

        #debug-box {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 5px;
            width: calc(100% - 40px);
            max-width: 770px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #555;
            word-break: break-all;
            display: none;
        }
    </style>
</head>

<body>

    <div class="header-logo">
        <img src="bf_login.png" alt="Logo Empresa">
    </div>

    <h2>OCR Validador de Etiquetas PRO</h2>

    <div class="scanner-container">
        <video id="video" autoplay playsinline></video>
        <div class="camera-guide">
            <div class="guide-box">
                <div class="corner-tl"></div>
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="corner-br"></div>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="loading">Conectando con Google Vision API... por favor espera...</div>

    <div class="controls">
        <button id="btnMaster" class="btn-master" onclick="capturar('master')">1. Capturar Master</button>
        <button id="btnProv" class="btn-prov" onclick="capturar('prov')" disabled>2. Capturar Proveedor</button>
    </div>

    <div class="results">
        <div class="card" id="cardMaster">
            <h3>DATOS MASTER</h3>
            <div class="data-row"><span class="label">NART</span> <span id="m-nart" class="val">---</span></div>
            <div class="data-row"><span class="label">LOTE</span> <span id="m-lote" class="val">---</span></div>
            <div class="data-row"><span class="label">CANT</span> <span id="m-cant" class="val">---</span></div>
        </div>

        <div class="card" id="cardProv">
            <h3>DATOS PROVEEDOR</h3>
            <div class="data-row"><span class="label">NART</span> <span id="p-nart" class="val">---</span></div>
            <div class="data-row"><span class="label">LOTE</span> <span id="p-lote" class="val">---</span></div>
            <div class="data-row"><span class="label">CANT</span> <span id="p-cant" class="val">---</span></div>
        </div>
    </div>

    <div id="global-status" class="status-badge"></div>

    <div id="debug-box"></div>

    <script>
        const GOOGLE_API_KEY = 'AIzaSyDe_Rr40Zq6Z-vTf0qeGlsMvzX11LMqBII';

        let masterData = { nart: null, lote: null, cant: null };
        let provData = { nart: null, lote: null, cant: null };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
            } catch (err) { alert("Error acceso cámara: " + err); }
        }

        function resetUI() {
            masterData = { nart: null, lote: null, cant: null };
            provData = { nart: null, lote: null, cant: null };

            ['m', 'p'].forEach(prefix => {
                document.getElementById(`${prefix}-nart`).innerText = '---';
                document.getElementById(`${prefix}-lote`).innerText = '---';
                document.getElementById(`${prefix}-cant`).innerText = '---';
            });

            document.getElementById('cardMaster').classList.remove('active');
            document.getElementById('cardProv').classList.remove('active');

            document.getElementById('btnProv').disabled = true;
            document.getElementById('btnProv').style.background = 'var(--gray)';

            document.getElementById('global-status').style.display = 'none';
            document.getElementById('debug-box').style.display = 'none';
        }

        async function capturar(tipo) {
            if (tipo === 'master') {
                resetUI();
            }

            document.getElementById('loading').style.display = 'block';

            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            const guideWidthRatio = 0.90;
            const guideHeightRatio = 0.65;

            const cropW = videoW * guideWidthRatio;
            const cropH = videoH * guideHeightRatio;
            const cropX = (videoW - cropW) / 2;
            const cropY = (videoH - cropH) / 2;

            canvas.width = cropW;
            canvas.height = cropH;
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            const imagenBase64Full = canvas.toDataURL('image/jpeg', 0.9);
            const imagenBase64 = imagenBase64Full.split(',')[1];

            const requestBody = {
                requests: [{
                    image: { content: imagenBase64 },
                    features: [{ type: "DOCUMENT_TEXT_DETECTION" }]
                }]
            };

            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                const textAnnotations = data.responses[0].fullTextAnnotation;
                let fullText = textAnnotations ? textAnnotations.text : '';

                if (!fullText) {
                    alert("No se detectó texto en la imagen.");
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                fullText = fullText.replace(/\s+/g, ' ');

                document.getElementById('debug-box').innerText = "GOOGLE OCR LEYÓ: " + fullText;
                document.getElementById('debug-box').style.display = 'block';

                if (tipo === 'master') {
                    procesarMaster(fullText);
                } else {
                    procesarProv(fullText);
                }

            } catch (e) {
                console.error("Error en Google API:", e);
                alert("Error procesando OCR con Google: " + e.message);
            }

            document.getElementById('loading').style.display = 'none';
        }

        function procesarMaster(text) {
            const nartMatch = text.match(/\d{5}\s*[-–—_~.]+\s*\d{5}\s*[-–—_~.]+\s*\d{2}/);
            const loteMatch = text.match(/Lote\s*de\s*proveedor\s*([A-Za-z0-9\-]+)/i);
            const cantMatch = text.match(/([\d,.]+)\s*UN/i);

            masterData.nart = nartMatch ? nartMatch[0].replace(/[-–—_~.\s]+/g, '-') : "No encontrado";
            masterData.lote = loteMatch ? loteMatch[1] : "No encontrado";
            masterData.cant = cantMatch ? cantMatch[1].replace(/[,.]/g, '') : "No encontrado";

            actualizarUI('m');
            document.getElementById('btnProv').disabled = false;
            document.getElementById('btnProv').style.background = 'var(--blue)';
            document.getElementById('cardMaster').classList.add('active');
        }

        function procesarProv(text) {
            const nMatchGen = text.match(/\d{5}\s*[-–—_~.]+\s*\d{5}\s*[-–—_~.]+\s*\d{2}/);
            provData.nart = nMatchGen ? nMatchGen[0].replace(/[-–—_~.\s]+/g, '-') : "No encontrado";

            const lMatchGen = text.match(/(?:LOTE|BATCH)\D*([A-Za-z0-9\-]{4,10})\b/i);
            provData.lote = lMatchGen ? lMatchGen[1] : "No encontrado";

            const cMatchGen = text.match(/(?:UNITS|PIEZAS POR TARIMA|Cant.*Pallet)\D*([\d,.]+)/i);
            provData.cant = cMatchGen ? cMatchGen[1].replace(/[,.]/g, '') : "No encontrado";

            const soloNumerosTexto = text.replace(/\D/g, '');
            const textoSinEspacios = text.replace(/\s+/g, '');

            if (masterData.nart !== "No encontrado") {
                const soloNumerosMasterNart = masterData.nart.replace(/\D/g, '');
                if (soloNumerosTexto.includes(soloNumerosMasterNart)) {
                    provData.nart = masterData.nart;
                }
            }

            if (masterData.lote !== "No encontrado") {
                const regexLoteMaster = new RegExp(masterData.lote, "i");
                if (regexLoteMaster.test(textoSinEspacios) || regexLoteMaster.test(text)) {
                    provData.lote = masterData.lote;
                }
            }

            if (masterData.cant !== "No encontrado") {
                const textoLimpioNum = text.replace(/[,.]/g, '');
                if (textoLimpioNum.match(new RegExp("\\b" + masterData.cant + "\\b"))) {
                    provData.cant = masterData.cant;
                }
            }

            actualizarUI('p');
            document.getElementById('cardProv').classList.add('active');
            compararTodo();
        }

        function actualizarUI(prefix) {
            const data = (prefix === 'm') ? masterData : provData;
            document.getElementById(`${prefix}-nart`).innerText = data.nart;
            document.getElementById(`${prefix}-lote`).innerText = data.lote;
            document.getElementById(`${prefix}-cant`).innerText = data.cant;
        }

        function compararTodo() {
            const status = document.getElementById('global-status');
            status.style.display = 'block';

            const coinciden = (masterData.nart === provData.nart && masterData.lote === provData.lote);
            const textoEstatus = coinciden ? "✅ ¡COINCIDENCIA TOTAL!" : "❌ DIFERENCIAS DETECTADAS";

            if (coinciden) {
                status.innerText = textoEstatus;
                status.style.background = 'var(--success)';
                status.style.color = 'white';
                reproducirSonido(true);
            } else {
                status.innerText = textoEstatus;
                status.style.background = 'var(--error)';
                status.style.color = 'white';
                reproducirSonido(false);
            }

            const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwJuN6BNPJWkHjRzYBIfRqT6SMkBQ6WNFPfOpT7Yefv0lL0ZwZMWneVrHfHI4iz_u7/exec';

            const payload = {
                fechaHora: new Date().toLocaleString('es-MX'),
                estatus: textoEstatus,
                m_nart: masterData.nart,
                m_lote: masterData.lote,
                m_cant: masterData.cant,
                p_nart: provData.nart,
                p_lote: provData.lote,
                p_cant: provData.cant
            };

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
        }

        function reproducirSonido(esExito) {
            const ruta = esExito ? 'functions/correct.mp3' : 'functions/error.mp3';
            const audio = new Audio(ruta);
            audio.play().catch(err => console.warn("Audio bloqueado o no encontrado: " + ruta));
        }

        initCamera();
    </script>
</body>

</html>
